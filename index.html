<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    
    <title>RM Film | Minlərlə film, Tək Məkan</title>
    <meta name="description" content="RM Film - Ən son filmlər, seriallar və aktyorlar haqqında məlumat, onlayn izləmə imkanı və şəxsi izləmə siyahısı.">
    <meta name="keywords" content="film izlə, serial izlə, yeni filmlər, RM Film, Rəsul Məmmədzadə, sinema, HD film">
    <meta name="author" content="Rəsul Məmmədzadə">
    <meta name="robots" content="index, follow">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rmfilm.az/">
    <meta property="og:title" content="RM Film | Minlərlə film, Tək Məkan">
    <meta property="og:description" content="Ən son filmləri və serialları kəşf et. Öz siyahını yarat və onlayn izlə.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">

    <style>
        /* Mood-a görə dəyişən dinamik arxa fon təbəqəsi */
        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-dark);
        }

        #ambient-layer {
            position: absolute;
            inset: 0;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
            transition: background 1s ease;
        }
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-dark: #05070a;
            --card-bg: #111827;
            --accent-gold: #fbbf24;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.4);
            --party-color: #818cf8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: auto;
            min-width: 1200px;
        }

        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            line-height: 1;
        }

        .slogan {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            background: linear-gradient(90deg, #9ca3af, #ffffff, #9ca3af);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            margin-left: 30px;
        }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            padding: 8px 15px;
            border-radius: 8px;
        }
        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }

        .nav-link.party-nav {
            color: var(--party-color);
            border: 1px solid rgba(129, 140, 248, 0.3);
            box-shadow: inset 0 0 10px rgba(129, 140, 248, 0.1);
        }
        .nav-link.party-nav:hover {
            background: rgba(129, 140, 248, 0.15);
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.3);
            border-color: var(--party-color);
        }

        .mood-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .mood-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .mood-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .mood-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d1d5db;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mood-happy:hover { background: #fbbf24 !important; color: #000 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); border-color: transparent; }
        .mood-strong:hover { background: #3b82f6 !important; color: #fff !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border-color: transparent; }
        .mood-sad:hover { background: #6b7280 !important; color: #fff !important; box-shadow: 0 0 15px rgba(107, 114, 128, 0.4); border-color: transparent; }
        .mood-scary:hover { background: #ef4444 !important; color: #fff !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-color: transparent; }
        .mood-love:hover { background: #f472b6 !important; color: #fff !important; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); border-color: transparent; }

        .watchlist-pill, .random-btn {
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .watchlist-pill {
            background: rgba(99, 102, 241, 0.15);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .random-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
        }

        .search {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 25px;
            color: white;
            width: 280px;
            transition: 0.4s;
        }

        .search:focus { width: 380px; outline: none; border-color: #a855f7; box-shadow: var(--neon-glow); }

        .genres-container { display: flex; justify-content: center; gap: 10px; padding: 20px 5%; overflow-x: auto; }

        .genre-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .genre-tag:hover, .genre-tag.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--neon-glow);
            border-color: transparent;
        }

        main {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 40px;
            padding: 20px 5% 100px;
        }

        .movie {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .movie:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), var(--neon-glow);
        }

        .movie img { 
            width: 100%; 
            height: 380px; 
            object-fit: cover; 
            transition: transform 0.6s ease, filter 0.6s ease;
        }

        .movie:hover img {
            transform: scale(1.1);
            filter: brightness(0.6);
        }

        .movie-info { 
            padding: 20px; 
            background: linear-gradient(to top, rgba(17, 24, 39, 0.95) 70%, transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            transform: translateY(70%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .movie:hover .movie-info { transform: translateY(0); }

        .quick-view-data {
            opacity: 0;
            transition: opacity 0.3s ease;
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .quick-view-data a {
            transition: opacity 0.2s;
        }
        .quick-view-data a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .movie:hover .quick-view-data { opacity: 1; }

        .movie-info h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .rating { color: var(--accent-gold); font-weight: 800; display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .rating::before { content: '★'; }

        .fav-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.2rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .fav-btn:hover { transform: scale(1.2); }
        .fav-btn.active { color: #ff4757; background: white; }

        .actor-card {
            background: var(--card-bg);
            border-radius:20px;
            text-align: center;
            padding-bottom: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: pointer;
        }
        .actor-card:hover { transform: translateY(-10px); border-color: #a855f7; }
        .actor-card img { width: 100%; height: 300px; object-fit: cover; }
        .actor-card h3 { margin: 15px 0 5px; font-size: 1rem; }
        .actor-card p { color: var(--text-muted); font-size: 0.8rem; margin: 0; }

        .modal {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%; max-width: 1100px; max-height: 90vh;
            border-radius: 30px; overflow-y: auto;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
        }

        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; cursor: pointer; color: white; z-index: 100; }
        
        .video-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            overflow: hidden;
        }

        .player-tabs {
            display: flex;
            background: #111;
            padding: 15px;
            gap: 10px;
            border-bottom: 1px solid #222;
            overflow-x: auto;
        }
        .player-btn {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            white-space: nowrap;
        }
        .player-btn.active { background: #6366f1; border-color: #6366f1; }
        
        .player-btn.alt-source { background: #fbbf24; color: #000; font-weight: bold; border: none; }

        .details-grid { padding: 40px; display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
        .details-grid img { width: 100%; border-radius: 20px; }

        .comment-btn {
            background: var(--primary-gradient); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .cast-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-top: 20px;}
        .cast-card { min-width: 100px; text-align: center; font-size: 0.8rem; cursor: pointer; transition: 0.3s;}
        .cast-card:hover { color: #a855f7; }
        .cast-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(168, 85, 247, 0.3);}

        .country-tabs { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .tab-btn {
            background: #111; color: #999; border: 1px solid #333;
            padding: 10px 25px; cursor: pointer; border-radius: 12px; transition: 0.4s;
        }
        .tab-btn.active { background: #fff; color: #000; }

        .creator-text {
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px; 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            text-align: right;
            width: 100%;
        }
        .search-container { display: flex; flex-direction: column; align-items: flex-end; }

        .loader { grid-column: 1/-1; text-align: center; padding: 20px; display: none; }
        
        /* --- TƏKMİLLƏŞDİRİLMİŞ OTAQ STRUKTURU --- */
        .watch-party-layout {
            display: flex !important;
            flex-direction: row !important;
            width: 100vw !important;
            height: calc(100vh - 85px) !important; 
            background: #000;
            overflow: hidden;
            position: relative;
        }
        
        .video-side {
            flex: 1 !important; 
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            order: 1;
        }

        /* --- PROFESSIONAL CHAT DESIGN --- */
        .chat-container {
            width: 400px !important; 
            min-width: 400px;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            height: 100%;
            border-left: 1px solid #30363d;
            order: 2;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .chat-header { 
            padding: 20px; 
            background: #161b22; 
            border-bottom: 1px solid #30363d; 
            text-align: left;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header::before {
            content: '';
            width: 10px;
            height: 10px;
            background: #23d160;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #23d160;
        }

        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            background: #0d1117;
            scrollbar-width: thin;
            scrollbar-color: #30363d transparent;
        }
        
        .chat-msg { 
            position: relative;
            background: #21262d; 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            border: 1px solid #30363d; 
            max-width: 90%; 
            word-wrap: break-word;
            line-height: 1.5;
            color: #c9d1d9;
            animation: msgFadeIn 0.3s ease;
        }

        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-msg.mine { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            border: none; 
            color: white; 
            border-bottom-right-radius: 2px;
        }

        .msg-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            gap: 15px;
        }

        .msg-user {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
        }
        .chat-msg.mine .msg-user { color: rgba(255,255,255,0.8); }

        .msg-time {
            font-size: 0.65rem;
            color: #484f58;
        }
        .chat-msg.mine .msg-time { color: rgba(255,255,255,0.6); }

        .chat-input-area { 
            padding: 20px; 
            background: #161b22; 
            border-top: 1px solid #30363d;
        }
        
        .chat-controls { display: flex; gap: 12px; flex-direction: column; }
        
        .emoji-list { 
            display: flex; 
            gap: 12px; 
            padding: 5px 0; 
            flex-wrap: wrap; 
            justify-content: flex-start;
        }
        .emoji-item { 
            cursor: pointer; 
            font-size: 1.3rem; 
            transition: 0.2s; 
            filter: grayscale(0.3);
        }
        .emoji-item:hover { transform: scale(1.3); filter: grayscale(0); }

        .chat-input-wrapper {
            display: flex;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 5px;
            transition: 0.3s;
        }
        .chat-input-wrapper:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .chat-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px; 
            font-size: 0.95rem;
            outline: none;
        }

        #party-player-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #party-player-container iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Setup Ekranı - TAM EKRAN PƏRDƏLƏR VƏ MƏRKƏZ KART */
        .room-setup-screen { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5000;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .curtain {
            position: absolute;
            top: 0;
            width: 50.5%; /* Üst-üstə düşməsi üçün */
            height: 100%;
            background: #8b0000;
            background-image: repeating-linear-gradient(90deg, #8b0000 0px, #b30000 30px, #8b0000 60px);
            z-index: 5;
            transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }
        .curtain-left { left: 0; transform: translateX(0); border-right: 3px solid #5a0000; }
        .curtain-right { right: 0; transform: translateX(0); border-left: 3px solid #5a0000; }
        
        /* Otağa keçid edildikdə pərdələrin açılması */
        .room-setup-screen.open .curtain-left { transform: translateX(-100%); }
        .room-setup-screen.open .curtain-right { transform: translateX(100%); }

        .projector-light {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.08) 0%, transparent 75%);
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s;
        }
        .room-setup-screen.open .projector-light { opacity: 1; }

        .room-card { 
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            max-width: 420px; 
            width: 90%;
            padding: 50px 40px; 
            border-radius: 35px; 
            border: 1px solid rgba(168, 85, 247, 0.4); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(168, 85, 247, 0.2);
            z-index: 10;
            text-align: center;
            transition: all 0.5s ease;
        }
        
        .room-setup-screen.open .room-card {
            transform: scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        .room-input { width: 100%; padding: 16px; margin: 12px 0; background: #0a0e14; border: 1px solid #30363d; color: white; border-radius: 12px; text-align: center; box-sizing: border-box; font-size: 1rem; }
        .room-input:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
        .room-btn-main { width: 100%; padding: 16px; margin-top: 15px; background: var(--primary-gradient); border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .room-btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        #party-catalog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 6000;
            padding: 30px 5%;
        }
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
        }
        .catalog-search {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            outline: none;
        }
        #party-catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            max-height: 80vh;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        /* SINXRON İDARƏETMƏ PANELI */
        .sync-controls {
            background: #161b22;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #30363d;
        }
        .sync-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .sync-btn:hover { background: var(--party-color); border-color: transparent; }
        .sync-btn.host-only { border-color: #fbbf24; color: #fbbf24; }
        
        /* Üst Bildiriş Paneli */
        .notify-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            pointer-events: none;
        }
        .notify {
            background: rgba(17, 24, 39, 0.9);
            color: #fff;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: notifyIn 0.2s ease;
        }
        @keyframes notifyIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
        
        /* --- ZƏR ATMA ANIMASIYASI --- */
        #dice-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .dice-scene {
            width: 100px;
            height: 100px;
            perspective: 600px;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: dice-rolling 2s infinite linear;
        }

        @keyframes dice-rolling {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .dice-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #fff;
            border: 2px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: #000;
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .front  { transform: rotateY(0deg) translateZ(50px); }
        .back   { transform: rotateY(180deg) translateZ(50px); }
        .right  { transform: rotateY(90deg) translateZ(50px); }
        .left   { transform: rotateY(-90deg) translateZ(50px); }
        .top    { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        .dice-dot { width: 15px; height: 15px; background: #000; border-radius: 50%; }

        #dice-text {
            margin-top: 40px;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="bg-overlay"></div>

    <div id="dice-overlay">
        <div class="dice-scene">
            <div class="dice">
                <div class="dice-face front">🎲</div>
                <div class="dice-face back">🎲</div>
                <div class="dice-face right">🎲</div>
                <div class="dice-face left">🎲</div>
                <div class="dice-face top">🎲</div>
                <div class="dice-face bottom">🎲</div>
            </div>
        </div>
        <div id="dice-text">Sizin üçün film seçilir...</div>
    </div>

    <header>
        <div style="display: flex; align-items: center;">
            <div class="brand">
                <h1 class="logo" onclick="location.reload()">RM Film</h1>
                <span class="slogan">Minlərlə film, Tək Məkan</span>
            </div>
            <nav class="nav-menu">
                <div class="nav-link active" id="nav-home" onclick="switchTo('movies')">Filmlər</div>
                <div class="nav-link" id="nav-series" onclick="switchTo('series')">Seriallar</div>
                <div class="nav-link" id="nav-actors" onclick="switchTo('actors')">Aktyorlar</div>
                <div class="nav-link party-nav" id="nav-party" onclick="switchTo('party')">Otaq </div>
            </nav>
        </div>
        
        <div class="search-container">
            <div class="creator-text">Yaradıcı: Rəsul Məmmədzadə </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div id="watchlist-count" class="watchlist-pill" onclick="showFavorites()">Siyahım (0)</div>
                <button class="random-btn" onclick="getRandomMovie()">🎲 Şans</button>
                <form id="form"><input type="text" id="search" class="search" placeholder="Axtarış..."></form>
            </div>
        </div>
    </header>

    <div id="movie-content">
        <div class="mood-section">
            <div class="mood-title">BU GÜN ÖZÜNÜ NECƏ HİSS EDİRSƏN?</div>
            <div class="mood-container">
                <button class="mood-btn mood-happy" onclick="searchByMood(35, '#2d2401')"><span>😊</span> Şən</button>
                <button class="mood-btn mood-strong" onclick="searchByMood(28, '#01162d')"><span>😎</span> Güclü</button>
                <button class="mood-btn mood-sad" onclick="searchByMood(18, '#1a1a1a')"><span>😢</span> Kədərli</button>
                <button class="mood-btn mood-scary" onclick="searchByMood(27, '#2d0101')"><span>😱</span> Həyəcanlı</button>
                <button class="mood-btn mood-love" onclick="searchByMood(10749, '#2d011a')"><span>😍</span> Sevgi</button>
            </div>
        </div>

        <div class="country-tabs">
            <button class="tab-btn active" onclick="filterByCountry('all', this)">Hamısı</button>
            <button class="tab-btn" onclick="filterByCountry('AZ', this)">Azərbaycan</button>
            <button class="tab-btn" onclick="filterByCountry('TR', this)">Türkiyə</button>
            <button class="tab-btn" onclick="filterByCountry('IN', this)">Hindistan</button>
        </div>
        <div id="genres" class="genres-container"></div>
    </div>

    <main id="main"></main>
    <div id="loader" class="loader">Yüklənir...</div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <div id="party-catalog-overlay">
        <div class="catalog-header">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="player-btn active" id="catalog-movies-tab" onclick="switchPartyCatalog('movies')">🎬 Filmlər</button>
                <button class="player-btn" id="catalog-series-tab" onclick="switchPartyCatalog('series')">📺 Seriallar</button>
            </div>
            <input type="text" id="catalog-search-inp" class="catalog-search" placeholder="Axtar...">
            <button class="player-btn" style="background:#ef4444;" onclick="document.getElementById('party-catalog-overlay').style.display='none'">Geri</button>
        </div>
        <div id="party-catalog-grid"></div>
    </div>

    <div id="season-episode-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:7000; padding:30px 5%;">
        <div style="background:var(--card-bg); border-radius:25px; padding:30px; max-width:600px; margin:auto; max-height:80vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 id="picker-title" style="margin:0; color:white;">Bölüm seçin</h2>
                <button class="player-btn" style="background:#ef4444;" onclick="closeSeasonPicker()">❌</button>
            </div>
            <div id="seasons-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:15px; margin-bottom:25px;"></div>
            <div id="episodes-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:10px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const API_KEY = '34d4692f40f9b4827503c570ebda8db7';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w1280';
        const CAST_IMG_PATH = 'https://image.tmdb.org/t/p/w200';
        const LANG = 'tr-TR';

        const main = document.getElementById('main');
        const loader = document.getElementById('loader');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        const bgOverlay = document.getElementById('bg-overlay');
        const movieContent = document.getElementById('movie-content');

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let currentPage = 1;
        let currentMode = 'movies';
        let currentApiUrl = `${BASE_URL}/discover/movie?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`;
        let isFavoritesView = false;
        let isLoading = false;

        // PeerJS Dəyişənləri
        let peer = null;
        let connections = [];
        let myUsername = "";
        let isHost = false;
        let catalogPage = 1;
        let catalogQuery = "";
        let partyCatalogMode = 'movies';
        let isCatalogLoading = false;
        let catalogType = 'movie';

        const genres = [
            { id: 28, name: 'Aksiyon' },
            { id: 12, name: 'Macəra' },
            { id: 16, name: 'Animasiya' },
            { id: 35, name: 'Komediya' },
            { id: 80, name: 'Cinayət' },
            { id: 18, name: 'Dram' },
            { id: 27, name: 'Qorxu' },
            { id: 878, name: 'Fantastika' },
            { id: 10749, name: 'Romantik' }
        ];

        const chatEmojis = ["😊", "🔥", "🍿", "😂", "😢", "😱", "😍", "🤝", "📽️", "🎬", "💯", "🎲"];

        function init() {
            renderGenres();
            getMovies(currentApiUrl);
            updateWatchlistCount();

            window.addEventListener('scroll', () => {
                if (isLoading || isFavoritesView || currentMode === 'party') return;
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                    currentPage++;
                    if(currentMode === 'movies') getMovies(currentApiUrl, false);
                    else if(currentMode === 'series') getSeries(currentApiUrl, false);
                    else if(currentMode === 'actors') getActors(currentApiUrl, false);
                }
            });

            document.getElementById('party-catalog-grid').addEventListener('scroll', e => {
                const el = e.target;
                if (el.scrollHeight - el.scrollTop <= el.clientHeight + 100) {
                    if(!isCatalogLoading) {
                        catalogPage++;
                        loadPartyCatalog(false);
                    }
                }
            });

            document.getElementById('catalog-search-inp').addEventListener('input', e => {
                catalogQuery = e.target.value;
                catalogPage = 1;
                loadPartyCatalog(true);
            });
        }

        function switchTo(mode) {
            currentMode = mode;
            currentPage = 1;
            main.innerHTML = '';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

            if(mode === 'movies') {
                document.getElementById('nav-home').classList.add('active');
                movieContent.style.display = 'block';
                currentApiUrl = `${BASE_URL}/discover/movie?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`;
                getMovies(currentApiUrl);
            } else if(mode === 'series') {
                document.getElementById('nav-series').classList.add('active');
                movieContent.style.display = 'block';
                currentApiUrl = `${BASE_URL}/discover/tv?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`;
                getSeries(currentApiUrl);
            } else if(mode === 'actors') {
                document.getElementById('nav-actors').classList.add('active');
                movieContent.style.display = 'none';
                currentApiUrl = `${BASE_URL}/person/popular?api_key=${API_KEY}&language=${LANG}`;
                getActors(currentApiUrl);
            } else if(mode === 'party') {
                document.getElementById('nav-party').classList.add('active');
                movieContent.style.display = 'none';
                renderPartySetup();
            }
        }

        function renderPartySetup() {
            const setupHtml = `
                <div class="room-setup-screen" id="room-setup">
                    <div class="curtain curtain-left"></div>
                    <div class="curtain curtain-right"></div>
                    <div class="projector-light"></div>
                    <div class="room-card" id="room-card-box">
                        <h1 style="color:var(--party-color); margin:0; font-size:2.5rem;">📽️</h1>
                        <h2 style="color:white; margin:15px 0;">Film Otağı</h2>
                        <input type="text" id="party-username" class="room-input" placeholder="Ləqəbiniz (Məs: Rəsul)">
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button class="room-btn-main" onclick="createRoom()">Otaq Yarat</button>
                        </div>
                        <div style="margin:20px 0; color:#444;">— və ya —</div>
                        <input type="text" id="join-room-id" class="room-input" placeholder="Otaq Kodu">
                        <button class="room-btn-main" style="background:#161b22; border:1px solid #333;" onclick="joinRoom()">Otağa Qoşul</button>
                    </div>
                </div>
            `;
            main.innerHTML = setupHtml;
        }

        function createRoom() {
            const user = document.getElementById('party-username').value;
            if(!user) return alert("Ləqəb daxil edin!");
            myUsername = user;
            isHost = true;
            
            peer = new Peer();
            peer.on('open', id => {
                renderPartyRoom(id);
                notify(`Otaq yaradıldı! Kod: ${id}`, 5000);
            });
            setupPeerEvents();
        }

        function joinRoom() {
            const user = document.getElementById('party-username').value;
            const roomId = document.getElementById('join-room-id').value;
            if(!user || !roomId) return alert("Bütün sahələri doldurun!");
            myUsername = user;
            isHost = false;

            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(roomId);
                setupConnection(conn);
                renderPartyRoom(roomId);
            });
            setupPeerEvents();
        }

        function setupPeerEvents() {
            peer.on('connection', conn => {
                setupConnection(conn);
                if(isHost) {
                    setTimeout(() => {
                        broadcast({ type: 'sys', msg: `${conn.metadata.user} otağa qatıldı.` });
                    }, 500);
                }
            });
        }

        function setupConnection(conn) {
            connections.push(conn);
            conn.on('data', data => handleData(data));
            conn.on('open', () => {
                if(!isHost) conn.send({ type: 'join', user: myUsername });
            });
        }

        function handleData(data) {
            if(data.type === 'msg') appendChat(data.user, data.msg, false);
            if(data.type === 'sys') notify(data.msg);
            if(data.type === 'sync') {
                const player = document.querySelector('#party-player-container iframe');
                if(player) {
                    player.src = `https://vidsrc.to/embed/${data.mode}/${data.id}${data.extra || ''}`;
                }
            }
        }

        function broadcast(data) {
            connections.forEach(c => {
                if(c.open) c.send(data);
            });
        }

        function renderPartyRoom(roomId) {
            const roomHtml = `
                <div class="watch-party-layout">
                    <div class="notify-container" id="notify-box"></div>
                    <div class="video-side">
                        <div id="party-player-container">
                            <div style="height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#333;">
                                <h1 style="font-size:4rem; margin:0;">📺</h1>
                                <p>Hələ heç bir film seçilməyib</p>
                                ${isHost ? '<button class="player-btn" onclick="openPartyCatalog()">Kataloqu Aç</button>' : ''}
                            </div>
                        </div>
                        <div class="sync-controls">
                            <div style="color:var(--text-muted); font-size:0.8rem; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:8px; border:1px solid #333;">
                                Otaq Kodu: <b style="color:white; cursor:pointer;" onclick="copyRoomID('${roomId}')">${roomId} 📋</b>
                            </div>
                            ${isHost ? '<button class="sync-btn host-only" onclick="openPartyCatalog()">🎬 Film Dəyiş</button>' : ''}
                            <button class="sync-btn" onclick="location.reload()">🚪 Çıxış</button>
                        </div>
                    </div>
                    <div class="chat-container">
                        <div class="chat-header">CANLI SÖHBƏT</div>
                        <div id="chat-messages"></div>
                        <div class="chat-input-area">
                            <div class="chat-controls">
                                <div class="emoji-list">
                                    ${chatEmojis.map(e => `<span class="emoji-item" onclick="addEmoji('${e}')">${e}</span>`).join('')}
                                </div>
                                <div class="chat-input-wrapper">
                                    <input type="text" id="chat-inp" class="chat-input" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') sendChat()">
                                    <button class="player-btn" style="border:none; background:transparent; font-size:1.2rem;" onclick="sendChat()">🚀</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            main.innerHTML = roomHtml;
            
            // Animasiya ilə pərdələri açırıq
            setTimeout(() => {
                const setupScreen = document.getElementById('room-setup');
                if(setupScreen) setupScreen.classList.add('open');
            }, 100);
        }

        function copyRoomID(id) {
            navigator.clipboard.writeText(id);
            notify("Kod kopyalandı!");
        }

        function sendChat() {
            const inp = document.getElementById('chat-inp');
            const msg = inp.value.trim();
            if(!msg) return;
            
            appendChat(myUsername, msg, true);
            broadcast({ type: 'msg', user: myUsername, msg: msg });
            inp.value = '';
        }

        function appendChat(user, msg, isMine) {
            const box = document.getElementById('chat-messages');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg ${isMine ? 'mine' : ''}`;
            msgDiv.innerHTML = `
                <div class="msg-info">
                    <span class="msg-user">${user}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-body">${msg}</div>
            `;
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        }

        function addEmoji(e) {
            document.getElementById('chat-inp').value += e;
            document.getElementById('chat-inp').focus();
        }

        function notify(msg, duration = 3000) {
            const box = document.getElementById('notify-box');
            if(!box) return;
            const n = document.createElement('div');
            n.className = 'notify';
            n.innerText = msg;
            box.appendChild(n);
            setTimeout(() => n.remove(), duration);
        }

        function openPartyCatalog() {
            document.getElementById('party-catalog-overlay').style.display = 'block';
            loadPartyCatalog(true);
        }

        async function loadPartyCatalog(isNew = true) {
            if(isNew) { catalogPage = 1; document.getElementById('party-catalog-grid').innerHTML = ''; }
            isCatalogLoading = true;
            
            const endpoint = catalogQuery ? `/search/${partyCatalogMode === 'movies' ? 'movie' : 'tv'}` : `/${partyCatalogMode === 'movies' ? 'movie' : 'tv'}/popular`;
            const url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&query=${catalogQuery}&page=${catalogPage}&language=${LANG}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            const grid = document.getElementById('party-catalog-grid');
            data.results.forEach(m => {
                const div = document.createElement('div');
                div.className = 'movie';
                div.style.height = '280px';
                div.innerHTML = `
                    <img src="${m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" style="height:100%">
                    <div class="movie-info" style="transform:translateY(0); background:rgba(0,0,0,0.8); padding:10px;">
                        <h3 style="font-size:0.8rem;">${m.title || m.name}</h3>
                        <button class="player-btn" style="width:100%; margin-top:5px; padding:5px;" onclick="selectForParty(${m.id}, '${partyCatalogMode === 'movies' ? 'movie' : 'tv'}')">Seç</button>
                    </div>
                `;
                grid.appendChild(div);
            });
            isCatalogLoading = false;
        }

        function switchPartyCatalog(mode) {
            partyCatalogMode = mode;
            document.getElementById('catalog-movies-tab').classList.toggle('active', mode === 'movies');
            document.getElementById('catalog-series-tab').classList.toggle('active', mode === 'series');
            loadPartyCatalog(true);
        }

        function selectForParty(id, mode) {
            if(mode === 'tv') {
                openSeasonPicker(id);
            } else {
                const playerBox = document.getElementById('party-player-container');
                playerBox.innerHTML = `<iframe src="https://vidsrc.to/embed/movie/${id}" allowfullscreen></iframe>`;
                broadcast({ type: 'sync', mode: 'movie', id: id });
                document.getElementById('party-catalog-overlay').style.display = 'none';
            }
        }

        async function openSeasonPicker(id) {
            document.getElementById('season-episode-overlay').style.display = 'block';
            const res = await fetch(`${BASE_URL}/tv/${id}?api_key=${API_KEY}&language=${LANG}`);
            const data = await res.json();
            
            const sGrid = document.getElementById('seasons-grid');
            sGrid.innerHTML = '';
            data.seasons.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'player-btn';
                btn.innerText = s.name;
                btn.onclick = () => loadEpisodes(id, s.season_number);
                sGrid.appendChild(btn);
            });
        }

        async function loadEpisodes(tvId, sNum) {
            const res = await fetch(`${BASE_URL}/tv/${tvId}/season/${sNum}?api_key=${API_KEY}&language=${LANG}`);
            const data = await res.json();
            const eGrid = document.getElementById('episodes-grid');
            eGrid.innerHTML = '';
            data.episodes.forEach(e => {
                const btn = document.createElement('button');
                btn.className = 'player-btn';
                btn.innerText = `${e.episode_number}`;
                btn.onclick = () => {
                    const extra = `/${sNum}/${e.episode_number}`;
                    const playerBox = document.getElementById('party-player-container');
                    playerBox.innerHTML = `<iframe src="https://vidsrc.to/embed/tv/${tvId}${extra}" allowfullscreen></iframe>`;
                    broadcast({ type: 'sync', mode: 'tv', id: tvId, extra: extra });
                    closeSeasonPicker();
                    document.getElementById('party-catalog-overlay').style.display = 'none';
                };
                eGrid.appendChild(btn);
            });
        }

        function closeSeasonPicker() { document.getElementById('season-episode-overlay').style.display = 'none'; }

        function renderGenres() {
            const container = document.getElementById('genres');
            container.innerHTML = `<div class="genre-tag active" onclick="filterByGenre('all', this)">Hamısı</div>`;
            genres.forEach(g => {
                const tag = document.createElement('div');
                tag.className = 'genre-tag';
                tag.innerText = g.name;
                tag.onclick = () => filterByGenre(g.id, tag);
                container.appendChild(tag);
            });
        }

        async function getMovies(url, isNew = true) {
            if(isNew) { main.innerHTML = ''; currentPage = 1; }
            isLoading = true;
            loader.style.display = 'block';
            try {
                const res = await fetch(`${url}&page=${currentPage}`);
                const data = await res.json();
                showMovies(data.results);
            } finally {
                isLoading = false;
                loader.style.display = 'none';
            }
        }

        async function getSeries(url, isNew = true) {
            if(isNew) { main.innerHTML = ''; currentPage = 1; }
            isLoading = true;
            loader.style.display = 'block';
            const res = await fetch(`${url}&page=${currentPage}`);
            const data = await res.json();
            showMovies(data.results, true);
            isLoading = false;
            loader.style.display = 'none';
        }

        async function getActors(url, isNew = true) {
            if(isNew) { main.innerHTML = ''; currentPage = 1; }
            isLoading = true;
            loader.style.display = 'block';
            const res = await fetch(`${url}&page=${currentPage}`);
            const data = await res.json();
            data.results.forEach(person => {
                const div = document.createElement('div');
                div.className = 'actor-card';
                div.onclick = () => showActorDetails(person.id);
                div.innerHTML = `
                    <img src="${person.profile_path ? CAST_IMG_PATH + person.profile_path : 'https://via.placeholder.com/200x300?text=No+Image'}">
                    <h3>${person.name}</h3>
                    <p>${person.known_for_department}</p>
                `;
                main.appendChild(div);
            });
            isLoading = false;
            loader.style.display = 'none';
        }

        function showMovies(movies, isSeries = false) {
            movies.forEach(m => {
                const { title, name, poster_path, vote_average, id, release_date, first_air_date } = m;
                const movieEl = document.createElement('div');
                movieEl.className = 'movie';
                movieEl.onclick = () => openDetails(id, isSeries);
                
                const isFav = favorites.some(f => f.id === id);
                
                movieEl.innerHTML = `
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${JSON.stringify(m).replace(/"/g, '&quot;')}, ${isSeries})">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                    <img src="${poster_path ? IMG_PATH + poster_path : 'https://via.placeholder.com/500x750?text=No+Image'}" alt="${title || name}">
                    <div class="movie-info">
                        <h3>${title || name}</h3>
                        <div class="rating">${vote_average.toFixed(1)}</div>
                        <div class="quick-view-data">
                            <span>Tarix: ${release_date || first_air_date || 'N/A'}</span>
                            <a href="#" style="color:#6366f1; font-weight:bold; margin-top:5px;">Ətraflı bax</a>
                        </div>
                    </div>
                `;
                main.appendChild(movieEl);
            });
        }

        async function openDetails(id, isSeries = false) {
            modal.style.display = 'flex';
            modalContent.innerHTML = '<div style="padding:100px; text-align:center;">Yüklənir...</div>';
            
            const type = isSeries ? 'tv' : 'movie';
            const [detailsRes, castRes] = await Promise.all([
                fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=${LANG}`),
                fetch(`${BASE_URL}/${type}/${id}/credits?api_key=${API_KEY}&language=${LANG}`)
            ]);
            
            const data = await detailsRes.json();
            const castData = await castRes.json();

            modalContent.innerHTML = `
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <div class="video-container">
                    <iframe id="player-frame" src="https://vidsrc.to/embed/${type}/${id}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                </div>
                
                <div class="player-tabs">
                    <button class="player-btn active" onclick="changeServer(this, 'https://vidsrc.to/embed/${type}/${id}')">Server 1 (Tövsiyə)</button>
                    <button class="player-btn" onclick="changeServer(this, 'https://vidsrc.me/embed/${type}/${id}')">Server 2</button>
                    <button class="player-btn alt-source" onclick="changeServer(this, 'https://embed.smashystream.com/playere.php?tmdb=${id}')">Xarici Mənbə (4K)</button>
                    ${isSeries ? `<button class="player-btn" style="background:#a855f7" onclick="openSeriesPicker(${id})">Bölüm Seçimi</button>` : ''}
                </div>

                <div class="details-grid">
                    <img src="${data.poster_path ? IMG_PATH + data.poster_path : ''}">
                    <div>
                        <h1 style="margin-top:0;">${data.title || data.name}</h1>
                        <p style="font-size:1.1rem; line-height:1.6; color:#d1d5db;">${data.overview || 'Məlumat yoxdur.'}</p>
                        <div style="display:flex; gap:20px; margin:25px 0;">
                            <div><strong>Janr:</strong> ${data.genres.map(g => g.name).join(', ')}</div>
                            <div><strong>IMDB:</strong> <span style="color:#fbbf24">★ ${data.vote_average.toFixed(1)}</span></div>
                        </div>
                        
                        <h3>Aktyor Heyəti</h3>
                        <div class="cast-container">
                            ${castData.cast.slice(0, 10).map(c => `
                                <div class="cast-card" onclick="showActorDetails(${c.id})">
                                    <img src="${c.profile_path ? CAST_IMG_PATH + c.profile_path : 'https://via.placeholder.com/80x80'}">
                                    <p><strong>${c.name}</strong><br><span style="color:#666">${c.character}</span></p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            // Player yükləndikdən sonra dilləri əlavə etmək üçün interval və ya xüsusi parametrlər istifadə edilə bilər.
            // Bu hissədə API-dan gələn dilləri iframe-ə inject etmək texniki olaraq vidsrc tərəfindən idarə olunur,
            // lakin biz vizual olaraq Azərbaycan və Türk dillərini prioritetləşdiririk.
        }

        function changeServer(btn, url) {
            document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('player-frame').src = url;
        }

        async function openSeriesPicker(id) {
            const res = await fetch(`${BASE_URL}/tv/${id}?api_key=${API_KEY}&language=${LANG}`);
            const data = await res.json();
            
            const pickerHtml = `
                <div style="padding:40px; background:#0f172a; border-radius:20px; margin-top:20px;">
                    <h2>Bölüm Seçimi</h2>
                    <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px;">
                        ${data.seasons.map(s => `
                            <button class="player-btn" onclick="loadSeasonEpisodes(${id}, ${s.season_number})">${s.name}</button>
                        `).join('')}
                    </div>
                    <div id="episodes-list" style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:10px;"></div>
                </div>
            `;
            modalContent.insertAdjacentHTML('beforeend', pickerHtml);
        }

        async function loadSeasonEpisodes(tvId, sNum) {
            const res = await fetch(`${BASE_URL}/tv/${tvId}/season/${sNum}?api_key=${API_KEY}&language=${LANG}`);
            const data = await res.json();
            const list = document.getElementById('episodes-list');
            list.innerHTML = data.episodes.map(e => `
                <button class="player-btn" onclick="changeServer(this, 'https://vidsrc.to/embed/tv/${tvId}/${sNum}/${e.episode_number}')">${e.episode_number}. Bölüm</button>
            `).join('');
        }

        async function showActorDetails(id) {
            modal.style.display = 'flex';
            modalContent.innerHTML = '<div style="padding:100px; text-align:center;">Yüklənir...</div>';
            
            const [detailsRes, movieRes] = await Promise.all([
                fetch(`${BASE_URL}/person/${id}?api_key=${API_KEY}&language=${LANG}`),
                fetch(`${BASE_URL}/person/${id}/combined_credits?api_key=${API_KEY}&language=${LANG}`)
            ]);
            
            const data = await detailsRes.json();
            const movieData = await movieRes.json();

            modalContent.innerHTML = `
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <div class="details-grid">
                    <img src="${data.profile_path ? IMG_PATH + data.profile_path : ''}">
                    <div>
                        <h1>${data.name}</h1>
                        <p style="color:#d1d5db; line-height:1.6;">${data.biography || 'Bioqrafiya yoxdur.'}</p>
                        <h3>Məşhur Filmləri</h3>
                        <div class="cast-container">
                            ${movieData.cast.slice(0, 10).map(m => `
                                <div class="cast-card" onclick="closeModal(); setTimeout(() => openDetails(${m.id}, ${m.media_type === 'tv'}), 300)">
                                    <img src="${m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/80x120'}">
                                    <p>${m.title || m.name}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function closeModal() {
            modal.style.display = 'none';
            modalContent.innerHTML = '';
        }

        function toggleFavorite(movie, isSeries) {
            const idx = favorites.findIndex(f => f.id === movie.id);
            if(idx === -1) {
                favorites.push({...movie, isSeries});
                notify("Siyahıya əlavə edildi");
            } else {
                favorites.splice(idx, 1);
                notify("Siyahıdan çıxarıldı");
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateWatchlistCount();
            if(isFavoritesView) showFavorites();
            else {
                // Cari səhifədə düyməni yenilə
                const btn = event.target.closest('.fav-btn');
                if(btn) btn.classList.toggle('active');
            }
        }

        function updateWatchlistCount() {
            document.getElementById('watchlist-count').innerText = `Siyahım (${favorites.length})`;
        }

        function showFavorites() {
            isFavoritesView = true;
            main.innerHTML = favorites.length ? '' : '<div style="grid-column:1/-1; text-align:center; padding:100px;">Siyahınız boşdur.</div>';
            showMovies(favorites);
            document.getElementById('movie-content').style.display = 'none';
        }

        function filterByGenre(id, el) {
            document.querySelectorAll('.genre-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentApiUrl = id === 'all' 
                ? `${BASE_URL}/discover/${currentMode === 'series' ? 'tv' : 'movie'}?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`
                : `${BASE_URL}/discover/${currentMode === 'series' ? 'tv' : 'movie'}?with_genres=${id}&api_key=${API_KEY}&language=${LANG}`;
            currentMode === 'series' ? getSeries(currentApiUrl) : getMovies(currentApiUrl);
        }

        function searchByMood(genreId, color) {
            bgOverlay.style.background = color;
            currentApiUrl = `${BASE_URL}/discover/movie?with_genres=${genreId}&api_key=${API_KEY}&language=${LANG}`;
            getMovies(currentApiUrl);
        }

        function filterByCountry(code, el) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentApiUrl = code === 'all'
                ? `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=${LANG}`
                : `${BASE_URL}/discover/movie?with_origin_country=${code}&api_key=${API_KEY}&language=${LANG}`;
            getMovies(currentApiUrl);
        }

        document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            const q = document.getElementById('search').value;
            currentApiUrl = `${BASE_URL}/search/${currentMode === 'series' ? 'tv' : 'movie'}?api_key=${API_KEY}&query=${q}&language=${LANG}`;
            currentMode === 'series' ? getSeries(currentApiUrl) : getMovies(currentApiUrl);
        });

        async function getRandomMovie() {
            const diceOverlay = document.getElementById('dice-overlay');
            diceOverlay.style.display = 'flex';
            
            try {
                const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}`);
                const data = await res.json();
                const randomMovie = data.results[Math.floor(Math.random() * 20)];
                
                // Animasiya üçün 2 saniyə gözləyirik
                setTimeout(() => {
                    diceOverlay.style.display = 'none';
                    openDetails(randomMovie.id);
                }, 2000);

            } catch (error) {
                console.error("Xəta:", error);
                diceOverlay.style.display = 'none';
            }
        }

        // Reklam əngəlləmə (sadə səviyyə)
        window.open = function() { return null; };

        init();
    </script>
</body>
</html>
