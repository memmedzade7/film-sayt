<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    
    <title>RM Film | Minlərlə film, Tək Məkan</title>
    <meta name="description" content="RM Film - Ən son filmlər, seriallar və aktyorlar haqqında məlumat, onlayn izləmə imkanı və şəxsi izləmə siyahısı.">
    <meta name="keywords" content="film izlə, serial izlə, yeni filmlər, RM Film, Rəsul Məmmədzadə, sinema, HD film">
    <meta name="author" content="Rəsul Məmmədzadə">
    <meta name="robots" content="index, follow">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rmfilm.az/">
    <meta property="og:title" content="RM Film | Minlərlə film, Tək Məkan">
    <meta property="og:description" content="Ən son filmləri və serialları kəşf et. Öz siyahını yarat və onlayn izlə.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">

    <style>
        /* Mood-a görə dəyişən dinamik arxa fon təbəqəsi */
        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-dark);
        }

        #ambient-layer {
            position: absolute;
            inset: 0;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
            transition: background 1s ease;
        }
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-dark: #05070a;
            --card-bg: #111827;
            --accent-gold: #fbbf24;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.4);
            --party-color: #818cf8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: auto;
            min-width: 1200px;
        }

        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            line-height: 1;
        }

        .slogan {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            background: linear-gradient(90deg, #9ca3af, #ffffff, #9ca3af);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            margin-left: 30px;
        }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            padding: 8px 15px;
            border-radius: 8px;
        }
        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }

        .nav-link.party-nav {
            color: var(--party-color);
            border: 1px solid rgba(129, 140, 248, 0.3);
            box-shadow: inset 0 0 10px rgba(129, 140, 248, 0.1);
        }
        .nav-link.party-nav:hover {
            background: rgba(129, 140, 248, 0.15);
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.3);
            border-color: var(--party-color);
        }

        .mood-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .mood-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .mood-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .mood-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d1d5db;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mood-happy:hover { background: #fbbf24 !important; color: #000 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); border-color: transparent; }
        .mood-strong:hover { background: #3b82f6 !important; color: #fff !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border-color: transparent; }
        .mood-sad:hover { background: #6b7280 !important; color: #fff !important; box-shadow: 0 0 15px rgba(107, 114, 128, 0.4); border-color: transparent; }
        .mood-scary:hover { background: #ef4444 !important; color: #fff !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-color: transparent; }
        .mood-love:hover { background: #f472b6 !important; color: #fff !important; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); border-color: transparent; }

        .watchlist-pill, .random-btn {
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .watchlist-pill {
            background: rgba(99, 102, 241, 0.15);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .random-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
        }

        .search {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 25px;
            color: white;
            width: 280px;
            transition: 0.4s;
        }

        .search:focus { width: 380px; outline: none; border-color: #a855f7; box-shadow: var(--neon-glow); }

        .genres-container { display: flex; justify-content: center; gap: 10px; padding: 20px 5%; overflow-x: auto; }

        .genre-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .genre-tag:hover, .genre-tag.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--neon-glow);
            border-color: transparent;
        }

        main {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 40px;
            padding: 20px 5% 100px;
        }

        .movie {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .movie:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), var(--neon-glow);
        }

        .movie img { 
            width: 100%; 
            height: 380px; 
            object-fit: cover; 
            transition: transform 0.6s ease, filter 0.6s ease;
        }

        .movie:hover img {
            transform: scale(1.1);
            filter: brightness(0.6);
        }

        .movie-info { 
            padding: 20px; 
            background: linear-gradient(to top, rgba(17, 24, 39, 0.95) 70%, transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            transform: translateY(70%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .movie:hover .movie-info { transform: translateY(0); }

        .quick-view-data {
            opacity: 0;
            transition: opacity 0.3s ease;
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .movie:hover .quick-view-data { opacity: 1; }

        .movie-info h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .rating { color: var(--accent-gold); font-weight: 800; display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .rating::before { content: '★'; }

        .fav-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.2rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .fav-btn:hover { transform: scale(1.2); }
        .fav-btn.active { color: #ff4757; background: white; }

        .actor-card {
            background: var(--card-bg);
            border-radius:20px;
            text-align: center;
            padding-bottom: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: pointer;
        }
        .actor-card:hover { transform: translateY(-10px); border-color: #a855f7; }
        .actor-card img { width: 100%; height: 300px; object-fit: cover; }
        .actor-card h3 { margin: 15px 0 5px; font-size: 1rem; }
        .actor-card p { color: var(--text-muted); font-size: 0.8rem; margin: 0; }

        .modal {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%; max-width: 1100px; max-height: 90vh;
            border-radius: 30px; overflow-y: auto;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
        }

        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; cursor: pointer; color: white; z-index: 100; }
        
        .video-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            overflow: hidden;
        }

        .player-tabs {
            display: flex;
            background: #111;
            padding: 15px;
            gap: 10px;
            border-bottom: 1px solid #222;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .player-btn {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            white-space: nowrap;
        }
        .player-btn.active { background: #6366f1; border-color: #6366f1; }
        
        .player-btn.alt-source { background: #fbbf24; color: #000; font-weight: bold; border: none; }
        .player-btn.az-dublaj { background: #ef4444; color: white; border: none; font-weight: bold; }
        .player-btn.tr-dublaj { background: #3b82f6; color: white; border: none; font-weight: bold; }

        .details-grid { padding: 40px; display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
        .details-grid img { width: 100%; border-radius: 20px; }

        /* TV Series Selectors */
        .tv-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }
        .tv-controls select {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 5px;
            flex: 1;
        }

        .comment-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .comment-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-family: inherit;
        }
        .comment-btn {
            background: var(--primary-gradient); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .comments-list { margin-top: 20px; }
        .comment-item {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 10px;
            border-left: 3px solid #a855f7;
        }

        .cast-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-top: 20px;}
        .cast-card { min-width: 100px; text-align: center; font-size: 0.8rem; cursor: pointer; transition: 0.3s;}
        .cast-card:hover { color: #a855f7; }
        .cast-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(168, 85, 247, 0.3);}

        .country-tabs { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .tab-btn {
            background: #111; color: #999; border: 1px solid #333;
            padding: 10px 25px; cursor: pointer; border-radius: 12px; transition: 0.4s;
        }
        .tab-btn.active { background: #fff; color: #000; }

        .creator-text {
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px; 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            text-align: right;
            width: 100%;
        }
        .search-container { display: flex; flex-direction: column; align-items: flex-end; }

        .loader { grid-column: 1/-1; text-align: center; padding: 20px; display: none; }
        
        /* --- TƏKMİLLƏŞDİRİLMİŞ OTAQ STRUKTURU --- */
        .watch-party-layout {
            display: flex !important;
            flex-direction: row !important;
            width: 100vw !important;
            height: calc(100vh - 85px) !important; 
            background: #000;
            overflow: hidden;
            position: relative;
        }
        
        .video-side {
            flex: 1 !important; 
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            order: 1;
        }

        /* --- PROFESSIONAL CHAT DESIGN --- */
        .chat-container {
            width: 400px !important; 
            min-width: 400px;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            height: 100%;
            border-left: 1px solid #30363d;
            order: 2;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .chat-header { 
            padding: 20px; 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
            border-bottom: 1px solid #30363d; 
            text-align: left;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header::before {
            content: '';
            width: 10px;
            height: 10px;
            background: #23d160;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #23d160;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            background: #0d1117;
            scrollbar-width: thin;
            scrollbar-color: #30363d transparent;
        }
        
        .chat-msg { 
            position: relative;
            background: #21262d; 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            border: 1px solid #30363d; 
            max-width: 90%; 
            word-wrap: break-word;
            line-height: 1.5;
            color: #c9d1d9;
            animation: msgFadeIn 0.3s ease;
        }

        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-msg.mine { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            border: none; 
            color: white; 
            border-bottom-right-radius: 2px;
        }

        .msg-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            gap: 15px;
        }

        .msg-user {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
        }
        .chat-msg.mine .msg-user { color: rgba(255,255,255,0.8); }

        .msg-time {
            font-size: 0.65rem;
            color: #484f58;
        }
        .chat-msg.mine .msg-time { color: rgba(255,255,255,0.6); }

        .chat-input-area { 
            padding: 20px; 
            background: #161b22; 
            border-top: 1px solid #30363d;
        }
        
        .chat-controls { display: flex; gap: 12px; flex-direction: column; }
        
        .emoji-list { 
            display: flex; 
            gap: 12px; 
            padding: 5px 0; 
            flex-wrap: wrap; 
            justify-content: flex-start;
        }
        .emoji-item { 
            cursor: pointer; 
            font-size: 1.3rem; 
            transition: 0.2s; 
            filter: grayscale(0.3);
        }
        .emoji-item:hover { transform: scale(1.3); filter: grayscale(0); }

        .chat-input-wrapper {
            display: flex;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 5px;
            transition: 0.3s;
        }
        .chat-input-wrapper:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .chat-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px; 
            font-size: 0.95rem;
            outline: none;
        }

        #party-player-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #party-player-container iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Setup Ekranı - TAM EKRAN PƏRDƏLƏR VƏ MƏRKƏZ KART */
        .room-setup-screen { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5000;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .stars-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .curtain {
            position: absolute;
            top: 0;
            width: 50.5%;
            height: 100%;
            background: linear-gradient(180deg, #8b0000 0%, #b30000 50%, #8b0000 100%);
            background-image: repeating-linear-gradient(90deg, transparent 0px, rgba(255,255,255,0.1) 30px, transparent 60px);
            z-index: 5;
            transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }
        .curtain-left { left: 0; transform: translateX(0); border-right: 3px solid #5a0000; }
        .curtain-right { right: 0; transform: translateX(0); border-left: 3px solid #5a0000; }
        
        .room-setup-screen.open .curtain-left { transform: translateX(-100%); }
        .room-setup-screen.open .curtain-right { transform: translateX(100%); }

        .projector-light {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.15) 0%, transparent 75%);
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s;
        }
        .room-setup-screen.open .projector-light { opacity: 1; }

        .room-card { 
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(20px);
            max-width: 450px; 
            width: 90%;
            padding: 50px 40px; 
            border-radius: 35px; 
            border: 1px solid rgba(168, 85, 247, 0.5); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(168, 85, 247, 0.3);
            z-index: 10;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .room-setup-screen.open .room-card {
            transform: scale(0.8);
            opacity: 0;

        /* SINXRON İDARƏETMƏ PANELI - HAMI İDARƏ EDƏ BİLƏR */
        .sync-controls {

            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #30363d;

        .sync-btn {
            background: rgba(129, 140, 248, 0.2);
            border: 1px solid rgba(129, 140, 248, 0.3);

            border-radius: 10px;

        .sync-btn:hover {

            transform: translateY(-2px);

        /* External Link Section */

        .external-link-input {

            gap: 10px;

        .external-link-input input {
            flex: 1;
            min-width: 200px;
            background: #0a0e14;
            border: 1px solid #30363d;

            padding: 10px 15px;

            outline: none;

        .external-link-input input:focus {
            border-color: var(--party-color);
        }
        .external-btn {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .external-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);

        .quick-links {

            background: rgba(255,255,255,0.05);

            border-radius: 20px;

            font-size: 0.8rem;
            transition: 0.3s;
            display: flex;

        }
        .quick-link-btn:hover {
            background: rgba(255,255,255,0.1);

        .quick-link-btn.youtube { background: #ff000020; border-color: #ff0000; }
        .quick-link-btn.youtube:hover { background: #ff000040; }

        /* Saved Links */

            border: none;

            cursor: pointer;

        .saved-link-actions button:hover {
            background: rgba(255,255,255,0.1);
        }
        .saved-link-actions button.delete { color: #ef4444; }

        /* Party Info Banner */
        .party-info-banner {
            background: linear-gradient(90deg, rgba(129, 140, 248, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            padding: 12px 20px;

            align-items: center;

</head>
<body>

    <div id="bg-overlay"></div>

    <header>
        <div style="display: flex; align-items: center;">
            <div class="brand">
                <h1 class="logo" onclick="location.reload()">RM Film</h1>

            <nav class="nav-menu">
                <div class="nav-link active" id="nav-home" onclick="switchTo('movies')">Filmlər</div>
                <div class="nav-link" id="nav-series" onclick="switchTo('series')">Seriallar</div>
                <div class="nav-link" id="nav-actors" onclick="switchTo('actors')">Aktyorlar</div>
                <div class="nav-link party-nav" id="nav-party" onclick="switchTo('party')">🎬 Otaq</div>
            </nav>
        </div>
        
        <div class="search-container">
            <div class="creator-text">Yaradıcı: Rəsul Məmmədzadə</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div id="watchlist-count" class="watchlist-pill" onclick="showFavorites()">Siyahım (0)</div>
                <button class="random-btn" onclick="getRandomMovie()">🎲 Şans</button>
                <form id="form"><input type="text" id="search" class="search" placeholder="Film, Serial və ya Aktyor..."></form>
            </div>
        </div>
    </header>

    <div id="movie-content">
        <div class="mood-section">
            <div class="mood-title">BU GÜN ÖZÜNÜ NECƏ HİSS EDİRSƏN?</div>
            <div class="mood-container">
                <button class="mood-btn mood-happy" onclick="searchByMood(35, '#2d2401')"><span>😊</span> Şən</button>
                <button class="mood-btn mood-strong" onclick="searchByMood(28, '#01162d')"><span>😎</span> Güclü</button>
                <button class="mood-btn mood-sad" onclick="searchByMood(18, '#1a1a1a')"><span>😢</span> Kədərli</button>
                <button class="mood-btn mood-scary" onclick="searchByMood(27, '#2d0101')"><span>😱</span> Həyəcanlı</button>
                <button class="mood-btn mood-love" onclick="searchByMood(10749, '#2d011a')"><span>😍</span> Sevgi</button>
            </div>
        </div>

        <div class="country-tabs">
            <button class="tab-btn active" onclick="filterByCountry('all', this)">Hamısı</button>
            <button class="tab-btn" onclick="filterByCountry('AZ', this)">Azərbaycan</button>
            <button class="tab-btn" onclick="filterByCountry('TR', this)">Türkiyə</button>
            <button class="tab-btn" onclick="filterByCountry('IN', this)">Hindistan</button>
        </div>
        <div id="genres" class="genres-container"></div>
    </div>

    <main id="main"></main>
    <div id="loader" class="loader">Yüklənir...</div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- Party Catalog Overlay -->
    <div id="party-catalog-overlay">
        <div class="catalog-header">
            <h2 style="color:white; margin:0;">🎬 Content Seçin</h2>
            <input type="text" id="catalog-search-inp" class="catalog-search" placeholder="Axtar...">
            <button class="player-btn" style="background:#ef4444;" onclick="document.getElementById('party-catalog-overlay').style.display='none'">✕ Bağla</button>
        </div>
        <div class="catalog-type-tabs">
            <button class="catalog-type-btn active" onclick="setCatalogType('movie', this)">🎬 Filmlər</button>
            <button class="catalog-type-btn" onclick="setCatalogType('tv', this)">📺 Seriallar</button>
        </div>
        <div id="party-catalog-grid"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const API_KEY = '34d4692f40f9b4827503c570ebda8db7';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w1280';
        const CAST_IMG_PATH = 'https://image.tmdb.org/t/p/w200'; 
        const LANG = 'tr-TR'; 

        const main = document.getElementById('main');
        const loader = document.getElementById('loader');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        const bgOverlay = document.getElementById('bg-overlay');
        const movieContent = document.getElementById('movie-content');
        
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let currentPage = 1;
        let currentMode = 'movies'; 
        let currentApiUrl = `${BASE_URL}/discover/movie?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`;
        let isFavoritesView = false;
        let isLoading = false;

        // PeerJS Variables
        let peer = null;
        let connections = []; 
        let myUsername = "";
        let isHost = false;
        let catalogPage = 1;
        let catalogQuery = "";
        let catalogType = 'movie';
        let isCatalogLoading = false;

        const genres = [
            { id: 28, name: 'Aksiyon' }, { id: 12, name: 'Macəra' },
            { id: 16, name: 'Animasiya' }, { id: 35, name: 'Komediya' },
            { id: 80, name: 'Cinayət' }, { id: 18, name: 'Dram' },
            { id: 27, name: 'Qorxu' }, { id: 878, name: 'Fantastika' },
            { id: 10749, name: 'Romantik' }
        ];

        const chatEmojis = ["😊", "🔥", "🍿", "😂", "😢", "😱", "😍", "🤝", "📽️", "🎬", "💯", "🎲", "👍", "❤️", "🌟"];

        function init() {
            renderGenres();
            getMovies(currentApiUrl);
            updateWatchlistCount();
            window.addEventListener('scroll', () => {
                if (isLoading || isFavoritesView || currentMode === 'party') return;
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                    currentPage++;
                    if(currentMode === 'movies') getMovies(currentApiUrl, false);
                    else if(currentMode === 'series') getSeries(currentApiUrl, false);
                    else if(currentMode === 'actors') getActors(currentApiUrl, false);
                }
            });

            document.getElementById('party-catalog-grid').addEventListener('scroll', e => {
                const el = e.target;
                if (el.scrollHeight - el.scrollTop <= el.clientHeight + 100) {
                    if(!isCatalogLoading) {
                        catalogPage++;
                        loadPartyCatalog(false);
                    }
                }
            });

            document.getElementById('catalog-search-inp').addEventListener('input', e => {
                catalogQuery = e.target.value;
                catalogPage = 1;
                loadPartyCatalog(true);
            });
        }

        function switchTo(mode) {
            currentMode = mode;
            currentPage = 1;
            main.innerHTML = '';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            if(mode === 'movies') {
                document.getElementById('nav-home').classList.add('active');
                movieContent.style.display = 'block';
                currentApiUrl = `${BASE_URL}/discover/movie?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`;
                getMovies(currentApiUrl);
            } else if(mode === 'series') {
                document.getElementById('nav-series').classList.add('active');
                movieContent.style.display = 'block';
                currentApiUrl = `${BASE_URL}/discover/tv?sort_by=popularity.desc&api_key=${API_KEY}&language=${LANG}`;
                getSeries(currentApiUrl);
            } else if(mode === 'actors') {
                document.getElementById('nav-actors').classList.add('active');
                movieContent.style.display = 'none';
                currentApiUrl = `${BASE_URL}/person/popular?api_key=${API_KEY}&language=${LANG}`;
                getActors(currentApiUrl);
            } else if(mode === 'party') {
                document.getElementById('nav-party').classList.add('active');
                movieContent.style.display = 'none';
                renderPartySetup();
            }
        }

        function renderPartySetup() {
            // Create stars background
            let starsHTML = '<div class="stars-bg">';
            for (let i = 0; i < 80; i++) {
                const size = Math.random() * 2 + 1;
                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const duration = Math.random() * 3 + 2;
                starsHTML += `<div class="star" style="width:${size}px;height:${size}px;top:${top}%;left:${left}%;--duration:${duration}s;"></div>`;
            }
            starsHTML += '</div>';

            const setupHtml = `
                <div class="room-setup-screen" id="room-setup">
                    ${starsHTML}
                    <div class="curtain curtain-left"></div>
                    <div class="curtain curtain-right"></div>
                    <div class="projector-light"></div>
                    
                    <div class="room-card" id="room-card-box">
                        <h1 style="color:var(--party-color); margin:0; font-size:2.5rem;">🎬</h1>
                        <h2 style="color:white; margin:15px 0 5px;">Sinema Otağı</h2>
                        <p style="font-size:0.9rem; color:#9ca3af; margin-bottom:30px;">Dostlarınla birlikdə izlə</p>
                        
                        <input type="text" id="party-username" class="room-input" placeholder="Adınız">
                        <div style="margin-top:10px;">
                            <button class="room-btn-main" onclick="initParty('host')">🚀 Otaq Yarat</button>
                            <div style="margin: 20px 0; color:#4b5563; font-size:0.8rem; font-weight:bold; letter-spacing:2px;">— VƏ YA —</div>
                            <input type="text" id="join-room-id" class="room-input" placeholder="Otaq ID-si">
                            <button class="room-btn-main" style="background:linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);" onclick="initParty('join')">🔗 Qoşul</button>
                        </div>
                        <p style="margin-top:25px; font-size:0.75rem; color:#4b5563; cursor:pointer;" onclick="location.reload()">Geri qayıt</p>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', setupHtml);
        }

        function initParty(type) {
            const user = document.getElementById('party-username').value;
            if(!user) return alert("Zəhmət olmasa ad seçin!");
            myUsername = user;

            document.getElementById('room-setup').classList.add('open');

            setTimeout(() => {
                if(type === 'host') {
                    isHost = true;
                    peer = new Peer();
                    peer.on('open', id => {
                        finalizePartyUI(id);
                        listenForConnections();
                    });
                } else {
                    const rid = document.getElementById('join-room-id').value;
                    if(!rid) return alert("ID daxil edilməyib!");
                    isHost = false;
                    peer = new Peer();
                    peer.on('open', () => {
                        const conn = peer.connect(rid);
                        setupConnHandlers(conn);
                        finalizePartyUI(rid);
                    });
                }
            }, 800);
        }

        function finalizePartyUI(roomId) {
            const setup = document.getElementById('room-setup');
            if(setup) setup.remove();
            renderActiveParty(roomId);
        }

        function renderActiveParty(roomId) {
            main.innerHTML = `
                <div class="watch-party-layout">
                    <div class="video-side">
                        <div class="party-info-banner">
                            <div class="room-id">Otaq: <strong>${roomId}</strong></div>
                            <div class="participant-count">
                                <span>👤</span>
                                <span id="participant-count">1</span> iştirakçı
                            </div>
                        </div>
                        <div id="party-player-container">
                            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#555; background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);">
                                <div style="font-size:4rem; margin-bottom:15px; animation: pulse 2s infinite;">📽️</div>
                                <div style="font-weight:bold; font-size:1.2rem;">Film/Serial seçin</div>
                                <div style="font-size:0.9rem; color:#888; margin-top:10px;">Aşağıdakı "Film Seç" düyməsini basın</div>
                            </div>
                        </div>
                        <div class="sync-controls">
                            <button class="sync-btn" onclick="openPartyCatalog()">🎬 Film/Serial Seç</button>
                            <button class="sync-btn" onclick="controlAction('play')">▶️ Başlat</button>
                            <button class="sync-btn" onclick="controlAction('pause')">⏸️ Dayandır</button>
                            <button class="sync-btn" onclick="controlAction('rewind')">⏪ -10s</button>
                            <button class="sync-btn" onclick="controlAction('forward')">⏩ +10s</button>
                        </div>
                        <div class="external-link-section" style="margin: 0 15px 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px;">
                            <div class="external-link-title">🔗 Xarici Linklər (YouTube, Google və s.)</div>
                            <div class="external-link-input">
                                <input type="text" id="external-link-inp" placeholder="https://...">
                                <button class="external-btn" onclick="playExternalLink()">▶️ Play</button>
                            </div>
                            <div class="quick-links">
                                <button class="quick-link-btn youtube" onclick="openYouTubeSearch()">📺 YouTube</button>
                                <button class="quick-link-btn google" onclick="openGoogleSearch()">🔍 Google</button>
                            </div>
                            <div class="saved-links" id="saved-links-container">
                                <!-- Saved links will appear here -->
                            </div>
                        </div>
                    </div>

                    <div class="chat-container">
                        <div class="chat-header">Canlı Söhbət 💬</div>
                        <div id="chat-messages"></div>
                        <div class="chat-input-area">
                            <div class="chat-controls">
                                <div class="emoji-list">
                                    ${chatEmojis.map(emoji => `<span class="emoji-item" onclick="addEmojiToInput('${emoji}')">${emoji}</span>`).join('')}
                                </div>
                                <div class="chat-input-wrapper">
                                    <input type="text" id="chat-input" class="chat-input" placeholder="Mesajınızı yazın...">
                                    <button class="comment-btn" style="border-radius:10px; margin:4px;" onclick="sendChatMessage()">GÖNDƏR</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendChatMessage(); });
            loadSavedLinks();
            updateParticipantCount();
        }

        // External Link Functions
        function playExternalLink() {
            const input = document.getElementById('external-link-inp');
            const url = input.value.trim();
            if(!url) return alert("Link daxil edin!");
            
            if(!url.startsWith('http')) {
                alert("Zəhmət olmasa tam link daxil edin (https://...)");
                return;
            }

            syncPartyPlayer(url);
            broadcast({ type: 'sync-external', url: url });
            addChatMessage("Sistem", "Xarici link paylaşıldı!", true);
            
            // Save to localStorage
            saveLink(url);
            input.value = '';
        }

        function openYouTubeSearch() {
            const query = prompt("YouTube-da axtarmaq istədiyiniz:");
            if(query) {
                const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                syncPartyPlayer(url);
                broadcast({ type: 'sync-external', url: url });
                addChatMessage("Sistem", "YouTube axtarışı paylaşıldı!", true);
                saveLink(url);
            }
        }

        function openGoogleSearch() {
            const query = prompt("Google-da axtarmaq istədiyiniz:");
            if(query) {
                const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                syncPartyPlayer(url);
                broadcast({ type: 'sync-external', url: url });
                addChatMessage("Sistem", "Google axtarışı paylaşıldı!", true);
                saveLink(url);
            }
        }

        function saveLink(url) {
            let links = JSON.parse(localStorage.getItem('partyLinks')) || [];
            if(!links.includes(url)) {
                links.unshift(url);
                if(links.length > 10) links.pop(); // Max 10 links
                localStorage.setItem('partyLinks', JSON.stringify(links));
                loadSavedLinks();
            }
        }

        function loadSavedLinks() {
            const container = document.getElementById('saved-links-container');
            if(!container) return;
            
            let links = JSON.parse(localStorage.getItem('partyLinks')) || [];
            if(links.length === 0) {
                container.innerHTML = '<div style="color:#666; font-size:0.8rem;">Hələ saxlanılmış link yoxdur</div>';
                return;
            }

            container.innerHTML = links.map(link => `
                <div class="saved-link-item">
                    <span>${link}</span>
                    <div class="saved-link-actions">
                        <button onclick="playSavedLink('${link}')" title="İzlə">▶️</button>

        // Sync Control - NOW AVAILABLE TO EVERYONE
        function controlAction(action) {
            const iframe = document.querySelector('#party-player-container iframe');
            if(iframe) {
                // Send message to control the player
                try {
                    iframe.contentWindow.postMessage({ type: 'playerControl', action: action }, '*');
                } catch(e) {
                    console.log('Cannot control external iframe');
                }
            }

            // Broadcast to other users
            broadcast({ type: 'video-control', action: action });
            
            const actionText = action === 'play' ? 'başladıldı' : action === 'pause' ? 'dayandırıldı' : 'dəyişdirildi';

        function addEmojiToInput(emoji) {
            const input = document.getElementById('chat-input');
            input.value += emoji;
            input.focus();
        }

        function setCatalogType(type, btn) {
            catalogType = type;
            catalogPage = 1;
            document.querySelectorAll('.catalog-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

        async function openPartyCatalog() {
            document.getElementById('party-catalog-overlay').style.display = 'block';
            catalogPage = 1;
            loadPartyCatalog(true);
        }

        async function loadPartyCatalog(isNew = true) {
            isCatalogLoading = true;
            const grid = document.getElementById('party-catalog-grid');
            if(isNew) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px;color:#666;">Yüklənir...</div>';
            
            let url;
            if(catalogQuery) {
                url = `${BASE_URL}/search/${catalogType}?api_key=${API_KEY}&query=${catalogQuery}&page=${catalogPage}&language=${LANG}`;
            } else {
                url = `${BASE_URL}/${catalogType}/popular?api_key=${API_KEY}&page=${catalogPage}&language=${LANG}`;
            }
            
            const res = await fetch(url);
            const data = await res.json();
            
            if(data.results.length === 0 && isNew) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px;color:#666;">Nəticə tapılmadı</div>';
                isCatalogLoading = false;
                return;
            }

            if(isNew) grid.innerHTML = '';
            
            data.results.forEach(m => {
                const div = document.createElement('div');
                div.className = 'movie';
                div.style.transform = "none";
                const title = m.title || m.name;
                const poster = m.poster_path ? CAST_IMG_PATH + m.poster_path : 'https://via.placeholder.com/150x225';
                div.innerHTML = `
                    <img src="${poster}" style="height:250px;object-fit:cover;">
                    <div style="padding:10px; font-size:0.8rem; text-align:center;">${title}</div>
                `;
                div.onclick = () => {
                    let embed;
                    if(catalogType === 'tv') {
                        embed = `https://vidsrc.cc/v2/embed/tv/${m.id}/1/1`;
                    } else {
                        embed = `https://vidsrc.cc/v2/embed/movie/${m.id}`;
                    }
                    syncPartyPlayer(embed);
                    broadcast({ type: 'sync-movie', embedUrl: embed });
                    document.getElementById('party-catalog-overlay').style.display = 'none';
                    addChatMessage("Sistem", `"${title}" başladıldı! 🎬`, true);
                };
                grid.appendChild(div);
            });
            isCatalogLoading = false;
        }

        function listenForConnections() {
            peer.on('connection', conn => {
                connections.push(conn);
                setupConnHandlers(conn);
                addChatMessage("Sistem", "🎉 Yeni iştirakçı daxil oldu!", true);
                updateParticipantCount();
            });
        }

        function setupConnHandlers(conn) {
            conn.on('data', data => {
                if(data.type === 'chat') {
                    addChatMessage(data.user, data.msg);
                    broadcast(data, conn);
                }
                if(data.type === 'sync-movie') {
                    syncPartyPlayer(data.embedUrl);
                }
                if(data.type === 'sync-external') {
                    syncPartyPlayer(data.url);
                }
                if(data.type === 'video-control') {
                    const iframe = document.querySelector('#party-player-container iframe');
                    if(iframe) {
                        try {
                            iframe.contentWindow.postMessage({ type: 'playerControl', action: data.action }, '*');
                        } catch(e) {}
                    }
                    addChatMessage("Sistem", "Video idarə edildi.", true);
                }
            });

            conn.on('close', () => {
                updateParticipantCount();
            });

            if(!isHost) connections = [conn];
        }

        function broadcast(data, excludeConn = null) {
            connections.forEach(c => {
                if(c !== excludeConn && c.open) {
                    c.send(data);
                }
            });
        }

        function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            const msg = inp.value;
            if(!msg) return;
            
            const chatData = { type: 'chat', user: myUsername, msg: msg };
            
            if(isHost || connections.length === 0) {
                broadcast(chatData);
            } else if(connections[0]) {
                connections[0].send(chatData);
            }
            
            addChatMessage(myUsername, msg, false, true);
            inp.value = '';
        }

        function addChatMessage(user, msg, isSystem = false, isMine = false) {
            const box = document.getElementById('chat-messages');
            if(!box) return;
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            div.className = `chat-msg ${isMine ? 'mine' : ''}`;
            
            if(isSystem) {
                div.style.background = "rgba(129, 140, 248, 0.15)";
                div.style.border = "1px dashed var(--party-color)";
                div.style.color = "var(--party-color)";
                div.style.textAlign = "center";
                div.style.fontSize = "0.85rem";
                div.style.alignSelf = "center";
                div.innerHTML = `<span>📢 ${msg}</span>`;
            } else {
                div.innerHTML = `
                    <div class="msg-info">
                        <span class="msg-user">${user}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-text">${msg}</div>
                `;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function syncPartyPlayer(url) {
            const container = document.getElementById('party-player-container');
            if(!container) return;
            
            let sandbox = "allow-forms allow-scripts allow-same-origin allow-presentation allowfullscreen";
            if(url.includes('youtube.com') || url.includes('google.com')) {
                sandbox = "allow-scripts allow-same-origin allow-popups";
            }
            
            container.innerHTML = `<iframe src="${url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen sandbox="${sandbox}"></iframe>`;
        }

        function updateParticipantCount() {
            const el = document.getElementById('participant-count');
            if(el) {
                const count = isHost ? connections.length + 1 : connections.length;
                el.innerText = count;
            }
        }

        async function getMovies(url, isNew = true) {
            if (isNew) { main.innerHTML = ''; currentPage = 1; isFavoritesView = false; }
            isLoading = true;
            loader.style.display = 'block';

                const res = await fetch(`${url}&page=${currentPage}`);

                if (data.results) showMovies(data.results);

            const index = favorites.findIndex(f => f.id === item.id);

            else { favorites.push(item); btn.classList.add('active'); }

            const id = data.results[Math.floor(Math.random() * 20)].id;

        function addComment(id) {
            const txt = document.getElementById('comment-text').value;
            if(!txt) return;
            const coms = JSON.parse(localStorage.getItem(`comments_${id}`)) || [];
            coms.unshift({ text: txt, date: new Date().toLocaleString() });
            localStorage.setItem(`comments_${id}`, JSON.stringify(coms));
            document.getElementById('comment-text').value = '';
            loadComments(id);
        }

        function loadComments(id) {
            const list = document.getElementById(`comments-list-${id}`);
            if(!list) return;
            const coms = JSON.parse(localStorage.getItem(`comments_${id}`)) || [];
            list.innerHTML = coms.map(c => `<div class="comment-item"><b>${c.date}</b><br>${c.text}</div>`).join('');
        }
